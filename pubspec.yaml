name: amirnagy
description: "amirnagy."
publish_to: 'none' 
version: 1.0.0

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  device_info_plus: ^10.1.0
  no_screenshot: 0.8.0
  safe_device: ^1.3.8
  url_launcher: ^6.3.1
  video_player: ^2.9.5
  chewie: 1.8.5
  flutter_pdfview: ^1.4.4
  provider: ^6.1.5+1
  intl: '>=0.19.0 <0.21.0'
  lottie: ^3.1.3
  wakelock_plus: 1.4.0
  google_fonts: ^6.2.1
  http: ^1.6.0
  path_provider: ^2.1.5
  encrypt: ^5.0.3
  shared_preferences: ^2.3.2
  qr_code_scanner: ^1.0.0
  uuid: ^4.5.1
  font_awesome_flutter: ^11.0.0
  flutter_spinkit: 5.2.1
  curved_navigation_bar: ^1.0.6
  flutter_widget_from_html_core: ^0.16.0
  file_picker: ^8.1.2
  google_sign_in: ^6.2.1
  firebase_core: ^3.13.1
  firebase_auth: ^5.5.4
  google_nav_bar: ^5.0.7
  image_picker: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/maskable-icon.png"
  web:
    enable: true
    image_path: "assets/logo.png"
    maskable_image_path: "assets/maskable-icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/app_bg.png
    - assets/error_illustration.png
    - assets/lang/
  fonts:
    - family: IconlyBold
      fonts:
        - asset: assets/fonts/IconlyBold.ttf
    - family: IconlyLight
      fonts:
        - asset: assets/fonts/IconlyLight.ttf
    - family: IconlyBroken
      fonts:
        - asset: assets/fonts/IconlyBroken.ttf

dependency_overrides:
  win32: 5.5.4
  google_fonts: ^6.2.1